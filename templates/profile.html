{% extends "base.html" %}
{% block content %}

<h2 class="fw-bold mb-4">My Profile</h2>

<div class="card p-5">
    <div class="row">
        <div class="col-md-6">
            <p><strong>Name:</strong> {{ user.name }}</p>
            <p><strong>Email:</strong> {{ user.email }}</p>
        </div>

        <div class="col-md-6">
            <p><strong>Role:</strong> {{ user.role }}</p>
            <p><strong>Member Since:</strong> {{ user.created_at }}</p>
        </div>
    </div>
</div>

{% endblock %}
