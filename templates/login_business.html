{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center align-items-center" style="min-height:80vh;">
    <div class="col-md-5">
        <div class="card p-5 shadow-lg">
            <div class="text-center mb-4">
                <i class="fas fa-building" style="font-size:3rem; color:#8b5cf6;"></i>
                <h3 class="fw-bold mt-3">Business Login</h3>
                <small class="text-muted">Manage products and analytics</small>
            </div>

            <form method="POST">
                <label class="form-label">Email Address</label>
                <input class="form-control mb-3" name="email" type="email" required>

                <label class="form-label">Password</label>
                <input class="form-control mb-4" name="password" type="password" required>

                <button class="btn btn-primary w-100 py-2 fw-bold" style="background-color:#8b5cf6;">Login as Business</button>
            </form>

            <hr class="my-4">

            <div class="text-center">
                <small>Don't have an account?</small><br>
                <a href="/signup" class="fw-bold text-primary">Sign Up as Business</a>
            </div>

            <div class="text-center mt-3">
                <small class="text-muted">Looking to review products?</small><br>
                <a href="/login/user" class="fw-bold" style="color:#6366f1;">Login as User</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
