{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center align-items-center" style="min-height:80vh;">
    <div class="col-md-5">
        <div class="card p-5 shadow-lg">
            <h3 class="text-center fw-bold mb-4">Welcome Back</h3>
            <p class="text-center text-muted mb-4">Choose your account type to continue</p>

            <div class="d-grid gap-3">
                <a href="/login/user" class="btn btn-primary btn-lg py-3">
                    <i class="fas fa-user me-2"></i>Login as User
                </a>

                <a href="/login/business" class="btn btn-success btn-lg py-3">
                    <i class="fas fa-building me-2"></i>Login as Business
                </a>

                <a href="/login/admin" class="btn btn-warning btn-lg py-3">
                    <i class="fas fa-crown me-2"></i>Login as Admin
                </a>
            </div>

            <div class="text-center mt-4">
                <small>Don't have an account?</small>
                <a href="/signup" class="ms-1">Sign Up</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
