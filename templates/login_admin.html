{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center align-items-center" style="min-height:80vh;">
    <div class="col-md-5">
        <div class="card p-5 shadow-lg">
            <div class="text-center mb-4">
                <i class="fas fa-crown" style="font-size:3rem; color:#f59e0b;"></i>
                <h3 class="fw-bold mt-3">Admin Login</h3>
                <small class="text-muted">System administration access</small>
            </div>

            <form method="POST">
                <label class="form-label">Email Address</label>
                <input class="form-control mb-3" name="email" type="email" required>

                <label class="form-label">Password</label>
                <input class="form-control mb-4" name="password" type="password" required>

                <button class="btn btn-warning w-100 py-2 fw-bold">Login as Admin</button>
            </form>

            <hr class="my-4">

            <div class="text-center">
                <small class="text-muted">Not an admin?</small><br>
                <a href="/login/user" class="fw-bold text-primary me-3">User Login</a>
                <a href="/login/business" class="fw-bold" style="color:#8b5cf6;">Business Login</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
