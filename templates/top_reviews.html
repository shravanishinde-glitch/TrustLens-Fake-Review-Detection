{% extends "base.html" %}
{% block content %}

<h2 class="fw-bold mb-5">Top Trusted Reviews</h2>

<div class="card p-4">
<table class="table table-hover align-middle">
<tr>
<th>#</th>
<th>Review</th>
<th>Trust Score</th>
</tr>

{% for review in reviews %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ review.text }}</td>
<td>
<span class="badge bg-success">{{ review.trust_score }}%</span>
</td>
</tr>
{% endfor %}

</table>
</div>

{% endblock %}
